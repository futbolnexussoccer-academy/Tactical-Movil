<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus v4.7 - Tactical Interactivity</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0e14'/%3E%3Cpath d='M20 20h60v60H20z' fill='none' stroke='%2300f2ff' stroke-width='3'/%3E%3Cpath d='M50 20v60M20 50h60' stroke='%2300f2ff' stroke-width='1' opacity='0.5'/%3E%3Ccircle cx='50' cy='50' r='8' fill='none' stroke='%23ff9f1c' stroke-width='3'/%3E%3Ccircle cx='80' cy='50' r='12' fill='none' stroke='%2300f2ff' stroke-width='2'/%3E%3Ccircle cx='20' cy='50' r='12' fill='none' stroke='%2300f2ff' stroke-width='2'/%3E%3C/svg%3E">

    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --cyan: #00f2ff;
            --border: rgba(0, 242, 255, 0.4);
            --orange: #ff9f1c;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Cambio: De center a flex-start para subir el campo */
            padding-top: 5px;           /* Cambio: Pequeño margen superior */
            align-items: center;
            height: 100vh;
            background-color: #0a0e14;
            background-image: 
                radial-gradient(circle at 20% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 0%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
                linear-gradient(to bottom, #0a0e14 0%, #1a2a3a 100%);
        }

        #orientation-guard {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0a0e14; z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
        }
        @media screen and (orientation: portrait) {
            #orientation-guard { display: flex; }
        }

        #stadium-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.6;
        }

        .stadium-light {
            position: absolute;
            top: -50px;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            filter: blur(40px);
        }
        .light-left { left: 10%; }
        .light-right { right: 10%; }

        .stands-silhouette {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent, black);
        }

        #sidebar {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
            width: 135px;
            max-height: calc(100vh - 30px);
            background: var(--glass);
            border-radius: 15px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 6px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            overflow-y: auto;
            scrollbar-width: none;
        }
        #sidebar::-webkit-scrollbar { display: none; }

        #logo-zone {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .team-logo-slot {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
        }

        .team-logo-slot img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            pointer-events: none;
        }

        .placeholder-icon {
            color: var(--cyan);
            opacity: 0.3;
            font-size: 20px;
            pointer-events: none;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            width: 100%;
            padding-bottom: 15px;
        }

        .group-header {
            grid-column: span 4;
            font-size: 7px;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 6px;
            margin-bottom: 2px;
            text-align: center;
            font-weight: bold;
            opacity: 0.9;
        }

        .tool-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            transition: 0.2s;
            position: relative;
            touch-action: manipulation;
        }

        .tool-btn.active {
            background: var(--cyan);
            color: #000;
            border: none;
            box-shadow: 0 0 12px var(--cyan);
        }

        .btn-img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            pointer-events: none;
        }

        .svg-icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        #main-wrapper {
            position: relative;
            perspective: 1000px;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            border: 3px solid rgba(255, 255, 255, 0.85);
            border-radius: 6px;
            overflow: hidden;
            background: #2E5F36;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2), 0 20px 60px rgba(0, 0, 0, 0.8);
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.8s ease;
        }

        #canvas-container.is-3d {
            transform: rotateX(40deg);
            box-shadow: 0 80px 120px rgba(0, 0, 0, 0.9), 0 -10px 40px rgba(0, 242, 255, 0.2);
        }

        #prop-panel {
            position: absolute;
            bottom: 30px;
            left: 120px;
            z-index: 1001;
            background: var(--glass);
            padding: 10px 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
            display: none;
            flex-direction: row;
            gap: 10px;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .color-dot {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.2s;
        }

        .dash-btn {
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 9px;
            font-weight: bold;
            transition: 0.2s;
        }

        #export-btn {
            width: 80px;
            padding: 6px 0;
            border-radius: 8px;
            background: var(--glass);
            color: white;
            font-weight: bold;
            border: 1px solid var(--border);
            font-size: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="orientation-guard">
        <div style="font-size: 50px; margin-bottom: 20px;">🔄</div>
        <h2>GIRA EL DISPOSITIVO</h2>
        <p>Por favor, usa el modo horizontal para una mejor experiencia.</p>
    </div>

    <div id="stadium-backdrop">
        <div class="stadium-light light-left"></div>
        <div class="stadium-light light-right"></div>
        <div class="stands-silhouette"></div>
    </div>

    <div id="logo-zone">
        <div class="team-logo-slot" onclick="document.getElementById('shield-input-1').click()">

            <div class="placeholder-icon" style="display:none;">⚽</div>
            <input type="file" id="shield-input-1" hidden accept="image/*" onchange="updateShield(event, 'shield-img-1')">
        </div>
        <div class="team-logo-slot" onclick="document.getElementById('shield-input-2').click()">
            <img id="shield-img-2" style="display:none;">
            <div class="placeholder-icon">🛡️</div>
            <input type="file" id="shield-input-2" hidden accept="image/*" onchange="updateShield(event, 'shield-img-2')">
        </div>
        <button id="export-btn" type="button" onclick="exportImage()">
            <span style="font-size: 14px;">📥</span>
            <span>Exportar</span>
        </button>
    </div>

    <div id="sidebar">
        <div class="grid-layout">
            <span class="group-header">Vista</span>
            <button class="tool-btn active" id="btn-3d"
                style="grid-column: span 4; width: 100%; border: 1px solid var(--orange); color: #000; background: var(--orange); font-size: 10px; box-shadow: 0 0 12px var(--orange); font-weight: bold;">🌍
                3D TÁCTICO</button>

            <span class="group-header">Pizarra</span>
            <button class="tool-btn active" id="btn-move" onclick="setMode('move')">🖐️</button>
            <button class="tool-btn" id="btn-arrow" onclick="setMode('arrow')">↗️</button>
            <button class="tool-btn" id="btn-line" onclick="setMode('line')">⟋</button>
            <button class="tool-btn" id="btn-curve" onclick="setMode('curve')">↪️</button>
            <button class="tool-btn" id="btn-poly" onclick="setMode('poly')">⬢</button>
            <button class="tool-btn" id="btn-zone" onclick="setMode('zone')">🔳</button>
            <button class="tool-btn" onclick="undo()"
                style="grid-column: span 2; width: 100%; font-size: 14px;">↩️</button>

            <span class="group-header">Equipo</span>
            <button class="tool-btn" onclick="addPiece('player', '#a30000')" style="color: #ff4d4d;">👕</button>
            <button class="tool-btn" onclick="addPiece('player', '#1a3a5a')" style="color: #3498db;">🎽</button>
            <button class="tool-btn" onclick="addPiece('check')" style="color: #34C759;">✅</button>
            <button class="tool-btn" onclick="addPiece('cross')" style="color: #FF3B30;">❌</button>

            <span class="group-header">Entreno</span>
            <button class="tool-btn" onclick="addPiece('ball')">⚽</button>
            <button class="tool-btn" onclick="addPiece('goal')">🥅</button>
            <button class="tool-btn" onclick="addPiece('cone')"><img id="cone-btn-img" class="btn-img" /></button>
            <button class="tool-btn" onclick="addPiece('valla')"><img id="valla-btn-img" class="btn-img" /></button>
            <button class="tool-btn" onclick="addPiece('wall')"><img id="wall-btn-img" class="btn-img" /></button>
            <button class="tool-btn" onclick="addPiece('dummy')"><img id="dummy-btn-img" class="btn-img" /></button>

            <span class="group-header">Acción</span>
            <button class="tool-btn" onclick="duplicateSelected()" style="color: var(--cyan);">
                <svg class="svg-icon" viewBox="0 0 24 24">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke="currentColor"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor"></path>
                </svg>

            <button class="tool-btn" onclick="deleteSelected()"
                style="color: #ff4d4d;">🗑️</button>
        </div>
    </div>

        <div id="canvas-container" class="is-3d"></div>

    <script>
        window.updateShield = (event, imgId) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    img.nextElementSibling.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        };

        window.addEventListener('touchmove', (e) => { 
            if (mode !== 'move' && e.touches.length < 2) {
                if (e.target.closest('#canvas-container')) {
                    e.preventDefault(); 
                }
            } 
        }, { passive: false });

        function lightenColor(hex, amount) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.min(255, (num >> 16) + amount);
            const g = Math.min(255, ((num >> 8) & 0xFF) + amount);
            const b = Math.min(255, (num & 0xFF) + amount);
            return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }
        function darkenColor(hex, amount) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.max(0, (num >> 16) - amount);
            const g = Math.max(0, ((num >> 8) & 0xFF) - amount);
            const b = Math.max(0, (num & 0xFF) - amount);
            return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function updateLabels(group) {
            const main = group.findOne('.main');
            if (!main) return;
            const sx = Math.abs(group.scaleX() || 1); const sy = Math.abs(group.scaleY() || 1);

            if (main instanceof Konva.Rect && !group.hasName('poly')) {
                const wM = (main.width() * sx / canvasW * REAL_W).toFixed(1);
                const hM = (main.height() * sy / canvasH * REAL_H).toFixed(1);

                if (!mH) { mH = new Konva.Text({ name: 'mH', fontSize: 10, fill: '#fff', fontStyle: 'bold', listening: false }); group.add(mH); }
                mW.scaleX(1/sx); mW.scaleY(1/sy); mH.scaleX(1/sx); mH.scaleY(1/sy);

            }

                let w = mPx(2.5), h = mPx(3); if (type === 'wall') { w = mPx(5.5); h = mPx(3.5); } if (type === 'dummy') { w = mPx(3.2); h = mPx(5.8); }
                const imgMap = { valla: vallaImg, wall: wallImg, dummy: dummyImg };
                g.add(new Konva.Image({ image: imgMap[type], x: -w / 2, y: -h / 2, width: w, height: h, name: 'main', ...shadowProps }));
            }
            g.on('transform dragmove', () => updateLabels(g)); layer.add(g); objectsStack.push(g); transformer.nodes([g]); selectedNode = g; layer.draw();
        };

        window.duplicateSelected = () => { if (!selectedNode) return; const clone = selectedNode.clone({ x: selectedNode.x() + 25, y: selectedNode.y() + 25 }); clone.on('transform dragmove', () => updateLabels(clone)); layer.add(clone); objectsStack.push(clone); transformer.nodes([clone]); selectedNode = clone; layer.draw(); };
        window.deleteSelected = () => { if (selectedNode) { selectedNode.destroy(); transformer.nodes([]); selectedNode = null; document.getElementById('prop-panel').style.display = 'none'; layer.draw(); } };
        window.undo = () => { if (objectsStack.length) { const last = objectsStack.pop(); last.destroy(); transformer.nodes([]); layer.draw(); } };

        window.applyColor = (c) => {
            if (selectedNode) {
                selectedNode.find('.main').forEach(m => { m.stroke(c); const rgb = Konva.Util.getRGB(c); const rgba20 = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.2)`;
                    if (m instanceof Konva.Circle) { m.fill(c); } else if (m instanceof Konva.Rect || (m instanceof Konva.Line && m.closed())) { m.fill(rgba20); } else if (m instanceof Konva.Arrow) { m.fill(c); }
                }); layer.draw();
            }
        };

        window.applyDash = (d) => { if (selectedNode) { selectedNode.find('.main').forEach(m => m.dash(d)); layer.draw(); } };

        window.exportImage = () => {
            transformer.nodes([]); layer.draw();
            const dataURL = stage.toDataURL({ pixelRatio: 2, mimeType: 'image/jpeg', quality: 0.9 });
            const link = document.createElement('a'); link.download = 'Nexus-Tactical-Export.jpg'; link.href = dataURL; link.click();
        };

        document.getElementById('btn-3d').onclick = () => {
            const container = document.getElementById('canvas-container'); const btn = document.getElementById('btn-3d');
            const is3D = container.classList.contains('is-3d');
            if (is3D) { container.classList.remove('is-3d'); btn.innerHTML = '🌍 2D DIBUJO'; btn.style.background = 'var(--cyan)'; btn.style.borderColor = 'var(--cyan)'; btn.style.boxShadow = '0 0 12px var(--cyan)'; } 
            else { setMode('move'); container.classList.add('is-3d'); btn.innerHTML = '🌍 3D TÁCTICO'; btn.style.background = 'var(--orange)'; btn.style.borderColor = 'var(--orange)'; btn.style.boxShadow = '0 0 12px var(--orange)'; }
            layer.draw();
        };
    </script>
</body>
